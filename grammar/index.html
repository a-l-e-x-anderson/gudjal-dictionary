<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="icon" type="image/png" href="/letter-b.png">
    <title>Birraya | Learn Gudjal</title>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,100..900;1,100..900&family=Cormorant+SC:wght@300;400;500;600;700&family=Coustard:wght@400;900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Patua+One&family=Raleway:ital,wght@0,100..900;1,100..900&family=Rock+Salt&display=swap');

        * {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans', sans-serif;
            box-sizing: border-box;
        }

        html, body {
            background: #fff7e0;
            height: 100%;
        }

        body {
            padding-left: 280px;
            padding-right: 280px;
        }

        #currently-selected-nav-item {
            border: 2px solid #282828;
            background: #e3e3e3;
        }

        nav {
            width: 280px;
            height: 100%;
            left: 0;
            background: white;
            border-right: 3px solid #282828;
            padding: 16px;

            display: flex;
            flex-flow: column;
            align-items: center;
            position: fixed;
        }

        nav ul {
            margin-top: 20px;
        }

        nav ul,
        nav ul li,
        nav ul li a {
            width: 100%;
            color: #282828;
        }

        nav ul li,
        nav ul li a {
            text-decoration: none;
            list-style-type: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        nav ul li a {
            height: 60px;
            margin: 4px;
            border-radius: 40px;
            border: 2px solid transparent;

            font-size: 22px;

            font-family: 'Patua One', serif;
            justify-content: flex-start;
            padding: 4px;
            padding-left: 16px;
        }

        nav ul li a:hover {
            border: 2px solid #282828;
            background: #e3e3e3;
        }

        #logo {
            width: 70%;
            height: 50px;

            display: flex;
            justify-content: flex-start;
            align-items: center;

            font-family: 'Patua One', serif;
            color: #282828;
            font-size: 36px;
            text-decoration: none;
        }

        #logo:hover {
            cursor: pointer;
        }

        .svg-icons {
            margin: 8px;
        }














        #right-bar {
            width: 280px;
            height: 100vh;      
            background: #fff7e0;   
            right: 0;
            top: 0;
            position: fixed;
            display: flex;
            flex-flow: column;
            align-items: center;
            border-left: 2px solid #282828;
            overflow: scroll;
        }

















        #search-area {
            width: 100%;
            padding: 16px;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-flow: column;
            gap: 16px;
        }

        #lesson-search {
            height: 50px;
            width: 80%;
            border-radius: 50px;
            border: none;
            border: 2px solid #282828;
            padding: 16px;
            font-size: 18px;
            box-shadow: 3px 3px 0px #000; 
            padding-left: 24px;
            padding-right: 24px;
        }

        #lesson-search:focus {
            outline: none;
        }



















        #refresh-button {
            width: 44px;
            height: 44px;
            background: #e3e3e3;
        }


        .raiserupper {
            transition: 0.4s ease;
        }

        .raiserupper:hover {
            cursor: pointer;
            transform: translateY(-8px);
        }

        .raiserupperabit {
            transition: 0.4s ease;
        }

        .raiserupperabit:hover {
            transform: translateY(-4px);
        }























        #grammar-container,
        #grammar-area {
            display: flex;
            flex-flow: column;
            align-items: center;
            padding-bottom: 40px;
        }
















        .ochre {
            background: #B77466;
        }

        .yellow {
            background: #FFE1AF;
        }

        .tan {
            background: #E2B59A;
        }

        .brown {
            background: #957C62;
        }

























        .grammar-explanation {
            width: 80%;
            background: white;
            margin-top: 20px;
            border: 2px solid black;
            border-radius: 16px;
            padding: 16px;
            padding-left: 24px;
            padding-right: 24px;
            padding-bottom: 28px;
            box-shadow: 3px 3px 0px #000;
        }

        .grammar-explanation > * {
            margin-top: 12px;
        }


        .linguist-explanation {
            display: none;
        }
        
        








        h3,
        h3 > span {
            font-size: 24px;
            font-family: 'Patua One', serif;
            font-weight: 100;
        }

        table tbody tr td {
            padding-right: 16px;
        }

        .ling-title,
        .ling-explanation {
            display: none;
        }



        p {
            line-height: 28px;
        }





        .smallcaps {
            font-variant: small-caps;
        }

        .gudjal-row {
            font-weight: bold;
        }

        .english-gloss-row,
        .english-translation-row {
            font-weight: 300;
        }

        .english-translation-row {
            font-style: italic;
        }









        @media (max-width: 1200px) {

            nav {
                width: 80px;
            }

            nav, 
            nav ul,
            nav ul li,
            nav ul li a {
                padding: 0;
            }

            #logo {
                font-size: 16px;
            }

            nav ul li a {
                font-size: 10px;
                width: 60px;
                height: 60px;
                border-radius: 8px;
                display: flex;
                justify-content: center;
                align-items: center;
                flex-flow: column;
            }

            #right-bar {
                background: white;
                display: none;
                position: fixed;
                width: 100%;
                height: 100%;
                border-left: none;
            }

            body {
                padding: 0px;
                padding-left: 80px;
            }
        }

    </style>
</head>
<body>

    <nav>
        <a href="/" id="logo">Birraya.</a>
        <ul>
            <li><a href="/"><img src="/icons/lessons.svg" alt="Lessons icon" width="24" height="24" class="svg-icons">Lessons</a></li>
            <li><a href="/dictionary/"><img src="/icons/dictionary.svg" alt="Lessons icon" width="24" height="24" class="svg-icons">Dictionary</a></li>
            <li><a href="/grammar/" id="currently-selected-nav-item"><img src="/icons/grammar.svg" alt="Lessons icon" width="24" height="24" class="svg-icons">Grammar</a></li>
            <li><a href="#"><img src="/icons/about.svg" alt="Lessons icon" width="24" height="24" class="svg-icons">About</a></li>
        </ul>
    </nav>

    <div id="grammar-container">

            
        
            <div id="search-area">
                
                    <input id="lesson-search" type="text">

            </div>

            <div id="grammar-area">


            </div>

    </div>

    <div id="right-bar">
        
    </div>


<script>

    let grammarCollection;

    Papa.parse("grammar-section.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: results => {
                displayGrammarPoints(results.data);
                grammarCollection = results.data;
            }
    })

    const grammarArea = document.querySelector("#grammar-area");

    function prepareSentenceForTable (sentence) {

        const splitSentence = sentence.split(" ");
        let preparedTableString = "";

        for (const word of splitSentence) {
            preparedTableString += `<td>${word}</td>`;
        }

        return preparedTableString;

    }

    function displayGrammarPoints (grammar) {

        grammarArea.innerHTML = grammar 
            .map (grammarPoint => {

                const gudjalRow = prepareSentenceForTable(grammarPoint.gudjal);
                const glossRow = prepareSentenceForTable(grammarPoint.gloss);
                const wordCount = grammarPoint.gudjal.split(" ").length;
                    
                return `
                <div class="grammar-explanation">
                    <h3><span class="ling-title">${grammarPoint.lingTitle}</span><span class="lay-title">${grammarPoint.layTitle}</span></h3>
                    <p><span class="ling-explanation">${grammarPoint.lingExplanation}</span><span class="lay-title">${grammarPoint.layExplanation}</span></p>
                    <table>
                        <tbody>
                            <tr class="gudjal-row">${gudjalRow}</tr>
                            <tr class="gloss-row">${glossRow}</tr>
                            <tr class="english-translation-row"><td colspan=${wordCount}>${grammarPoint.translation}</td></tr>
                        </tbody>
                    </table>
                </div>
            `})
            .join("");
    }


</script>
</body>
</html>
