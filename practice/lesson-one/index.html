<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/letter-b.png">
    <title>Birraya | Learn Gudjal</title>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,100..900;1,100..900&family=Cormorant+SC:wght@300;400;500;600;700&family=Coustard:wght@400;900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Patua+One&family=Raleway:ital,wght@0,100..900;1,100..900&family=Rock+Salt&display=swap');

        * {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans', sans-serif;
            box-sizing: border-box;
        }

        p, table * {
            font-weight: 300;
        }

        html, body {
            background: #fff7e0;
            height: 100%;
        }

        body {
            padding: 0px;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Patua One', serif;
            font-weight: 100;
            width: 100%;
        }

        h1, h2 {
            text-align: center;
        }

        a {
            text-decoration: none;
        }

        h1 {
            font-size: 40px;
        }

        h2 {
            font-size: 40px;
        }

        h3 {
            font-size: 24px;
            margin-top: 32px;
        }

        











        
        .button {
            height: 52px;
            text-decoration: none;
            border-radius: 60px;
            border: 2px solid #282828;
            background: white;
            width: fit-content;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: 500;
            box-shadow: 3px 3px 0px #000;
        }

        .button:hover {
            cursor: pointer;
        }

        #exit-button {
            font-size: 16px;
            font-weight: bold;
        }

        #exit-button:hover {
            cursor: pointer;
        }










        #practice-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-flow: column;
        }

        #activity-container {
            width: 100%;
            height: 85%;
            display: flex;
            flex-flow: column;
            align-items: center;
        }

        #bottom-bar {
            width: 100%;
            height: 15%;
            min-height: 80px;
            background: white;
            border-top: 2px solid #282828;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        #bottom-button-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 52px;
            width: 80%;
            max-width: 800px;

        }

        .bottom-button {
            width: 45%;
            max-width: 180px;
        }














        #top-section {
            height: 80px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
        }

        #progress-bar {
            height: 24px;
            width: 80%;
            max-width: 800px;
            border: 2px solid #282828;
            background: #83B181;
            border-radius: 16px;
        }


        #mid-section {
            height: 100%;
            width: 100%;
            max-width: 800px;
            display: flex;
            align-items: space-between;
            padding: 32px;
            gap: 16px;
        }









        #instructions-box {
            width: 50%;

            display: flex;
            flex-flow: column;
            align-items: center;

            justify-content: center;
        }

        .user-instructions {
            color: #282828;
            text-align: center;
            font-size: 36px;
        }

        .to-be-translated {
            font-size: 28px;
            font-weight: 200;
            height: 60px;
            width: 100%;
            text-align: center;
        }

        .answer-selection-box {
            width: 50%;
            height: 100%;
            display: flex;
            flex-flow: column;
            gap: 16px;
            justify-content: center;
        }

        .possible-answer-button {
            height: 80px;
            width: 100%;
            background: white;
            border-radius: 16px;
            border: 2px solid #282828;
            box-shadow: 3px 3px 0px #000;
            padding: 16px;
            gap: 16px;

            display: flex;
            align-items: center;
        }

        .box-number {
            height: 32px;
            width: 32px;
            border-radius: 32px;
            background: #e3e3e3;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .answer-display {
            text-align: left;
        }
















        .raiserupper {
            transition: transform 0.4s ease;
        }

        .raiserupper:hover {
            cursor: pointer;
            transform: translateY(-8px);
        }

        .raiserupperabit {
            transition: transform 0.4s ease;
        }

        .raiserupperabit:hover {
            transform: translateY(-4px);
        }

        @media (max-width: 800px) {


            .user-instructions {
                font-size: 28px;
            }

            #instructions-box .to-be-translated {
                font-size: 24px;
            }

            #mid-section {
                flex-flow: column;
                align-items: center;
                justify-content: flex-start;
                overflow-y: auto;
                gap: 4px;
            }

            .answer-selection-box {
                justify-content: flex-start;    
            }

            #mid-section > * {
                width: 100%;
            }

            .possible-answer-button {
                height: 60px;
                padding: 0px;
            }

            .possible-answer-button * {
                font-size: 14px;
            }

            .box-number {
                margin-left: 16px;
            }

        }


    </style>
</head>
<body>

    


    <div id="practice-container">

        <div id="activity-container">

            <div id="top-section">
                <div id="exit-button">⨉</div>
                <div id="progress-bar"></div>
            </div>

            <div id="mid-section">

                <div id="instructions-box" class="quiz-component">

                    <h2 class="user-instructions">Translate:</h2>
                    <p class="to-be-translated">name</p>

                </div>

                <div class="answer-selection-box" class="quiz-component">

                    <div class="possible-answer-button raiserupper" id="answer-one"><div class="box-number">1</div><div class="answer-display">Riyala</div></div>
                    <div class="possible-answer-button raiserupper" id="answer-two"><div class="box-number">2</div><div class="answer-display">Yaguy</div></div>
                    <div class="possible-answer-button raiserupper" id="answer-three"><div class="box-number">3</div><div class="answer-display">Ngaya</div></div>
                    <div class="possible-answer-button raiserupper" id="answer-four"><div class="box-number">4</div><div class="answer-display">Yaru</div></div>

                </div>
            </div>

        </div>

        
        <div id="bottom-bar">

            <div id="bottom-button-container">
                <div class="button bottom-button" id="skip-button">Skip</div>
                <div class="button bottom-button" id="check-button">Check</div>
            </div>


        </div>

    </div>




<script>

    const answerOne = document.querySelector("#answer-one");
    const answerTwo = document.querySelector("#answer-two");
    const answerThree = document.querySelector("#answer-three");
    const answerFour = document.querySelector("#answer-four");

    const answerButtons = document.querySelectorAll(".possible-answer-button");
    const boxNumbers = document.querySelectorAll(".box-number");

    function turnButtonWhite (button) {
        button.style.background = "white";
        button.style.transition = "0s";
    }

    function turnEveryButtonWhite () {
        answerButtons.forEach(button => {
            button.style.background = "white";
        })
    }

    function turnBoxNumberWhite (boxNumber) {
        turnEveryBoxNumberWhite();
        boxNumber.style.background = "#E2B59A";
    }

    function turnEveryBoxNumberWhite () {
        boxNumbers.forEach(boxNumber => {
            boxNumber.style.background = "#E3E3E3";
        })
    }

    function turnButtonTan (button) {
        turnEveryButtonWhite();
        button.style.background = "#E2B59A";
    }

    answerButtons.forEach(button => {
        const innerBoxNumber = button.querySelector(".box-number");

        button.addEventListener("click", () => {

            turnBoxNumberWhite(innerBoxNumber);
            turnButtonTan(button);

        });


    })

</script>
</body>
</html>
