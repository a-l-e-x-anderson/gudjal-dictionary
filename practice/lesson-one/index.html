<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/letter-b.png">
    <title>Birraya | Learn Gudjal</title>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,100..900;1,100..900&family=Cormorant+SC:wght@300;400;500;600;700&family=Coustard:wght@400;900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Patua+One&family=Raleway:ital,wght@0,100..900;1,100..900&family=Rock+Salt&display=swap');

        * {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans', sans-serif;
            box-sizing: border-box;
        }

        p, table * {
            font-weight: 300;
        }

        html, body {
            background: #fff7e0;
            height: 100%;
        }

        body {
            padding: 0px;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Patua One', serif;
            font-weight: 100;
            width: 100%;
        }

        h1, h2 {
            text-align: center;
        }

        a {
            text-decoration: none;
        }

        h1 {
            font-size: 40px;
        }

        h2 {
            font-size: 40px;
        }

        h3 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 16px;
        }

        











        
        .button {
            height: 52px;
            text-decoration: none;
            border-radius: 60px;
            border: 2px solid #282828;
            background: white;
            width: fit-content;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: 500;
            box-shadow: 3px 3px 0px #000;
        }

        .button:hover {
            cursor: pointer;
        }

        #exit-button {
            font-size: 16px;
            font-weight: bold;
        }

        #exit-button:hover {
            cursor: pointer;
        }












        .ochre {
            background: #B77466;
        }

        .yellow {
            background: #FFE1AF;
        }

        .tan {
            background: #E2B59A;
        }

        .brown {
            background: #957C62;
        }






















        #practice-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-flow: column;
        }

        #activity-container {
            width: 100%;
            height: 85%;
            display: flex;
            flex-flow: column;
            align-items: center;
        }

        #bottom-bar {
            width: 100%;
            height: 15%;
            min-height: 80px;
            background: white;
            border-top: 2px solid #282828;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        #bottom-button-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 52px;
            width: 80%;
            max-width: 600px;

        }

        .bottom-button {
            width: 45%;
            max-width: 180px;
        }














        #top-section {
            height: 80px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
        }

        #progress-bar-outline {
            height: 24px;
            width: 80%;
            max-width: 720px;
            border: 2px solid #282828;
            border-radius: 16px;
            box-shadow: 3px 3px 0px #000;
        }

        #progress-bar-filling {
            width: 0%;
            height: 100%;
            background: #A2E29A;
            border-radius: 24px;
            transition: 0.2s ease;
            display: flex;
        }



        .mid-section {
            height: 100%;
            width: 100%;
            max-width: 800px;
            display: flex;
            align-items: space-between;
            padding: 32px;
            gap: 16px;
        }









        #instructions-box {
            width: 50%;

            display: flex;
            flex-flow: column;
            align-items: center;

            justify-content: center;
        }

        .user-instructions {
            color: #282828;
            text-align: center;
            font-size: 36px;
        }

        .to-be-translated {
            font-size: 28px;
            font-weight: 200;
            height: 60px;
            width: 100%;
            text-align: center;
        }

        .answer-selection-box {
            width: 50%;
            height: 100%;
            display: flex;
            flex-flow: column;
            gap: 16px;
            justify-content: center;
        }

        .possible-answer-button {
            height: 80px;
            width: 100%;
            background: white;
            border-radius: 16px;
            border: 2px solid #282828;
            box-shadow: 3px 3px 0px #000;
            padding: 16px;
            gap: 16px;

            display: flex;
            align-items: center;
        }

        .box-number {
            height: 32px;
            width: 32px;
            border-radius: 32px;
            background: #e3e3e3;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .answer-display {
            text-align: left;
        }









        /* Practice exercises set up */

        .practice-page-intro {
            font-size: 32px;
        }

        .in-this-exercise {
            margin-top: 16px;
        }

        #practice-setup {
            display: flex;
            flex-flow: column;
            align-items: center;
            max-width: 600px;
        }

        #practice-setup ul {
            width: 100%;
            display: flex;
            flex-flow: wrap;
            justify-content: center;
            gap: 8px;
        }

        #practice-setup ul li {
            list-style-type: none;
            box-shadow: none;
            height: 32px;
        }

        #practice-setup ul li:hover {
            cursor: default;
        }


        #multiple-choice-exercise {
            display: none;
        }

        .checkbox-container {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin: 4px;
        }

        #checkbox-container-container {
            width: 100%;
            margin-top: 24px;
            font-weight: 500;
        }

        #start-lesson {
            width: 180px;
        }

        .hidden-checkboxes {
            display: none;
        }

        .checkbox-on-display {
            height: 32px;
            width: 32px;
            background: white;
            border: 2px solid #282828;
            display: inline-block;
            border-radius: 8px;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .checkbox-on-display:hover {
            cursor: pointer;
        }

        .tick {
            font-size: 20px;
            display: flex;
        }














        /* Translation exercises */

        #translation-exercise {
            display: none;
        }

        #inner-translation-area {
            width: 100%;
            display: flex;
            flex-flow: column;
            align-items: center;
            padding-top: 80px;
        }

        #user-text-input {
            height: 52px;
            width: 100%;
            max-width: 360px;
            border-radius: 52px;
            font-size: 20px;
            font-weight: 300;
            padding-left: 16px;
            border: 2px solid #282828;
            box-shadow: 3px 3px 0px #000;
        }





















        /* Victory Screen */

        #victory-screen {
            display: none;
            flex-flow: column;
            align-items: center;
        }

        #congration-cake {
            width: 50%;
        }














        .raiserupper {
            transition: transform 0.4s ease;
        }

        .raiserupper:hover {
            cursor: pointer;
            transform: translateY(-8px);
        }

        .raiserupperabit {
            transition: transform 0.4s ease;
        }

        .raiserupperabit:hover {
            transform: translateY(-4px);
        }

        @media (max-width: 800px) {




            .user-instructions {
                font-size: 28px;
            }

            #instructions-box .to-be-translated {
                font-size: 24px;
            }

            .mid-section {
                flex-flow: column;
                align-items: center;
                justify-content: flex-start;
                overflow-y: auto;
                gap: 4px;
            }

            .answer-selection-box {
                justify-content: flex-start;    
            }

            .mid-section > * {
                width: 100%;
            }

            .possible-answer-button {
                height: 60px;
                padding: 0px;
            }

            .possible-answer-button * {
                font-size: 14px;
            }

            .box-number {
                margin-left: 16px;
            }



            /* Lesson setup */

            .practice-page-intro {
                font-size: 28px;
            }

            h3 {
                font-size: 20px;
            }

            #practice-setup ul {
                gap: 8px;
            }

            #practice-setup ul li {
                font-size: 14px;
                padding: 16px;
            }

            .checkbox-container {
                width: 100%;
                display: flex;
                justify-content: space-between;
                margin: 4px;
            }

            #checkbox-container-container {
                width: 100%;
                margin-top: 24px;
                font-weight: 500;
            }

            #start-lesson {
                margin-top: 16px;
                height: 36px; 
            }

            .checkbox-on-display {
                height: 24px;
                width: 24px;
                background: white;
                border: 2px solid #282828;
                display: inline-block;
                border-radius: 8px;

                display: flex;
                justify-content: center;
                align-items: center;
            }

            .checkbox-on-display span {
                font-size: 14px;
            }

            .button {
                padding: 20px;
            }












            /* Top, middle and bottom bar proportions */

            #top-section {
                height: 40px;
                align-items: flex-end;
            }

            .mid-section {
                overflow-y: hidden;
            }

            #activity-container {
                height: 90%;
            }

            #bottom-bar {
                height: 10%;
                min-height: 40px;
            }

            .button {
                height: 36px;
                padding: 16px;
            }

        }


    </style>
</head>
<body>

    


    <div id="practice-container">

        <div id="activity-container">

            <div id="top-section">
                <div id="exit-button">⨉</div>
                <div id="progress-bar-outline">
                    <div id="progress-bar-filling">
                        
                    </div>
                </div>
            </div>

            <div class="mid-section" id="practice-setup">

                <h2 class="practice-page-intro">Practice Exercises: Chapter 1</h2>
                <h3 class="in-this-exercise">In this exercise, we will practise:</h3>

                <ul>
                    <li class="button ochre">Introductions</li>
                    <li class="button yellow">Skin groups</li>
                    <li class="button brown">Basic pronouns</li>
                </ul>

                <div id="checkbox-container-container">

                    <h3 class="question-type-heading">Question types:</h3>

                    <div class="checkbox-container">
                        <input type="checkbox" class="hidden-checkboxes" id="checkbox-multiple-choice-vocabulary">
                        <label for="checkbox-multiple-choice-vocabulary">Multiple choice</label><span class="checkbox-on-display"><span class="tick">✓</span></span>
                    </div>
                    <div class="checkbox-container">
                        <input type="checkbox" class="hidden-checkboxes" id="checkbox-typed-translations">
                        <label for="checkbox-typed-translations">Typed response</label><span class="checkbox-on-display"><span class="tick">✓</span></span>
                    </div>
                    <div class="checkbox-container">
                        <input type="checkbox" class="hidden-checkboxes" id="checkbox-audio-recognition">
                        <label for="checkbox-audio-recognition">Audio recognition</label><span class="checkbox-on-display"><span class="tick">✓</span></span>
                    </div>

                </div>
                

                <div class="button raiserupper" id="start-lesson">Start</div>

            </div>

            <div class="mid-section" id="multiple-choice-exercise">

                <div id="instructions-box" class="quiz-component">

                    <h2 class="user-instructions">Translate:</h2>
                    <p class="to-be-translated" id="multiple-choice-to-be-translated">name</p>

                </div>

                <div class="answer-selection-box" class="quiz-component">

                    <div class="possible-answer-button raiserupper" id="answer-one"><div class="box-number" id="box-number-one">1</div><div class="answer-display" id="answer-display-one">Riyala</div></div>
                    <div class="possible-answer-button raiserupper" id="answer-two"><div class="box-number" id="box-number-two">2</div><div class="answer-display" id="answer-display-two">Yaguy</div></div>
                    <div class="possible-answer-button raiserupper" id="answer-three"><div class="box-number" id="box-number-three">3</div><div class="answer-display" id="answer-display-three">Ngaya</div></div>
                    <div class="possible-answer-button raiserupper" id="answer-four"><div class="box-number" id="box-number-four">4</div><div class="answer-display" id="answer-display-four">Yaru</div></div>

                </div>
            </div>

            <div class="mid-section" id="translation-exercise">

                <div id="inner-translation-area">

                    <h2 class="user-instructions">Translate:</h2>
                    <p class="to-be-translated">name</p>
                    <input type="text" id="user-text-input">

                </div>

            </div>

            <div class="mid-section" id="victory-screen">

                <h2>Congration! You done it!</h2>
                <img src="congration.png" alt="An image of a congratulatory cake." id="congration-cake">

            </div>

        </div>

        
        <div id="bottom-bar">

            <div id="bottom-button-container">
                <div class="button bottom-button" id="skip-button">Skip</div>
                <div class="button bottom-button" id="check-button">Check</div>
            </div>


        </div>

    </div>




<script>

    const midSections = document.querySelectorAll(".mid-section");

    const answerOne = document.querySelector("#answer-one");
    const answerTwo = document.querySelector("#answer-two");
    const answerThree = document.querySelector("#answer-three");
    const answerFour = document.querySelector("#answer-four");

    const boxNumberOne = document.querySelector("#box-number-one");
    const boxNumberTwo = document.querySelector("#box-number-two");
    const boxNumberThree = document.querySelector("#box-number-three");
    const boxNumberFour = document.querySelector("#box-number-four");

    const answerDisplayOne = document.querySelector("#answer-display-one");
    const answerDisplayTwo = document.querySelector("#answer-display-two");
    const answerDisplayThree = document.querySelector("#answer-display-three");
    const answerDisplayFour = document.querySelector("#answer-display-four");

    const answerButtons = document.querySelectorAll(".possible-answer-button");
    const boxNumbers = document.querySelectorAll(".box-number");

    const bottomBar = document.querySelector("#bottom-bar");
    const checkButton = document.querySelector("#check-button");
    const skipButton = document.querySelector("#skip-button");

    const victoryScreen = document.querySelector("#victory-screen");

    const multipleChoiceToBeTranslated = document.querySelector("#multiple-choice-to-be-translated");

    const bottomButtonContainer = document.querySelector("#bottom-button-container");

    let currentlySelectedAnswer = null;
    let isAnswerCorrect = false;
    let hasQuestionBeenAnswered = false;

    let questionType = "";

    const progressBar = document.querySelector("#progress-bar-filling");
    let progressPercentage = 0;

    let theQuestion;
    let theAnswer;











    // Setting up the lesson

    const checkboxAudioRecognition = document.querySelector("#checkbox-audio-recognition");
    const checkboxTypedTranslations = document.querySelector("#checkbox-typed-translations");
    const checkboxMultipleChoiceVocabulary = document.querySelector("#checkbox-multiple-choice-vocabulary");

    const startLessonButton = document.querySelector("#start-lesson");

    const setUpMenu = document.querySelector("#practice-setup");
    const multipleChoiceQuestionContainer = document.querySelector("#multiple-choice-exercise");

    let settingUpTheLesson = true;
    let lessonIsOver = false;

    let putInAudioQuestions = true;
    let putInTypedQuestions = true;
    let putInMultipleChoiceQuestions = true;

    const ticks = document.querySelectorAll(".tick");
    const clickableCheckBoxes = document.querySelectorAll(".checkbox-container");

    clickableCheckBoxes.forEach((checkbox) => {

        const tick = checkbox.querySelector(".tick");

        checkbox.addEventListener("click", () => {

            if (tick.style.display != "none") {
                tick.style.display = "none";

            } else {
                tick.style.display = "flex";
            }

        })
    })

    

    function checkIfLessonHasStartedOrEnded () {
        if (settingUpTheLesson === true || lessonIsOver === true) {
            bottomButtonContainer.style.display = "none";
        } else {
            bottomButtonContainer.style.display = "";
        }
    }

    startLessonButton.addEventListener("click", () => {
        settingUpTheLesson = false;
        setUpMenu.style.display = "none";
        multipleChoiceQuestionContainer.style.display = "flex";
        checkIfLessonHasStartedOrEnded();
    })

    checkIfLessonHasStartedOrEnded();

















    const possibleAnswers = ["ngaya", "yinda", "riyala", "yaguy", "ngani", "yaru", "yinu", "Gurrguru", "Wudhurrayngan"];

    const translations = {
        "I": "ngaya",
        "You": "yinda",
        "Name": "riyala",
        "Skin": "yaguy",
        "What": "ngani",
        "Here": "yaru",
        "Your": "yinu"
    }



    function disappearMidSections () {
        midSections.forEach(midSection => {
            midSection.style.display = "none";
        })
    }











    function jumbleArray (theArray) {
        return theArray.sort(() => Math.random() - 0.5);
    }

    function randomNumber (range) {
        return Math.floor(Math.random() * range.length);
    }

    function selectRandom (thing) {
        return thing[randomNumber(thing)];
    }

    function selectRandomKey (object) {
        const listOfKeys = Object.keys(object);
        return listOfKeys[randomNumber(listOfKeys)];
    }

    function loadQuestionsAndAnswers () {

        theQuestion = selectRandomKey(translations);
        theAnswer = translations[theQuestion];

        let answerList = [];
        answerList.push(theAnswer);

        while (answerList.length < 4) {
            const newAddition = selectRandom(possibleAnswers);

            if (!answerList.includes(newAddition)) {
                answerList.push(newAddition);
            };
        }

        let preparedAnswerList = jumbleArray(answerList);

        answerDisplayOne.textContent = preparedAnswerList[0];
        answerDisplayTwo.textContent = preparedAnswerList[1];
        answerDisplayThree.textContent = preparedAnswerList[2];
        answerDisplayFour.textContent = preparedAnswerList[3];

        multipleChoiceToBeTranslated.innerText = theQuestion;
    }














    // Functions for selecting questions and marking them selected.

    function turnButtonWhite (button) {
        button.style.background = "white";
        button.style.transition = "0s";
    }

    function turnEveryButtonWhite () {
        answerButtons.forEach(button => {
            button.style.background = "white";
        })
    }

    function turnBoxNumberWhite (boxNumber) {
        turnEveryBoxNumberWhite();
        boxNumber.style.background = "#C28F70";
    }

    function turnEveryBoxNumberWhite () {
        boxNumbers.forEach(boxNumber => {
            boxNumber.style.background = "#E3E3E3";
        })
    }

    function selectAnswer (button) {
        currentlySelectedAnswer = button.querySelector(".answer-display").textContent;
        turnEveryButtonWhite();
        button.style.background = "#E2B59A";
    }

    function declareVictory() {
        console.log("Victory!");
        lessonIsOver = true;
        checkIfLessonHasStartedOrEnded();
        disappearMidSections();
        victoryScreen.style.display = "flex";
    }

    function checkForVictory () {
        if (progressPercentage >= 100) {
            declareVictory();
        }
    }









    function increasePercentageByFive () {
        progressPercentage += 10;
    }

    function extendProgressBar () {
        if (progressPercentage <= 100) {
            progressBar.style.width = `${progressPercentage}%`;
        } else {
            return;
        }
    }

    function levelUp () {
        increasePercentageByFive();
        extendProgressBar();
        checkForVictory();
    }










    // Functions for generating new question and answering questions.

    function newQuestion () {
        bottomBar.style.background = "white";
        hasQuestionBeenAnswered = false;
        turnEveryButtonWhite();
        turnEveryBoxNumberWhite();
        checkButton.innerText = "Check";
        currentlySelectedAnswer = null;
        let theQuestion;
        let theAnswer;

        loadQuestionsAndAnswers();
    }

    function markQuestionAnswered () {
        hasQuestionBeenAnswered = true;
        checkButton.innerText = "Next Question";
    }

    function markAnswerRight () {
        markQuestionAnswered();
        bottomBar.style.background = "#A2E29A";
        isAnswerCorrect = true;
        levelUp();
    }

    function markAnswerWrong () {
        markQuestionAnswered();
        bottomBar.style.background = "#E29AA2";
        isAnswerCorrect = false;
    }

    function checkAnswer () {
        if (currentlySelectedAnswer === theAnswer) {
            markAnswerRight();
        } else {
            markAnswerWrong();
        }
    }

    function checkOrMoveOn () {
        if (currentlySelectedAnswer === null) {
            return;
        } else if (hasQuestionBeenAnswered === false) {
            checkAnswer();
        } else {
            newQuestion();
        };
    }





    newQuestion();

















    // Event listeners





        // Checking answers and going to next question

    checkButton.addEventListener("click", () => {
        checkOrMoveOn();
    })

    window.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            checkOrMoveOn();
        };
    })





        // Selecting answers

    window.addEventListener("keydown", (event) => {

        if (hasQuestionBeenAnswered === true) {
            return;
        }

        switch (event.key) {
            case "1":
                selectAnswer(answerOne);
                turnBoxNumberWhite(boxNumberOne);
                break;
            case "2":
                selectAnswer(answerTwo);
                turnBoxNumberWhite(boxNumberTwo);
                break;
            case "3":
                selectAnswer(answerThree);
                turnBoxNumberWhite(boxNumberThree);
                break;
            case "4":
                selectAnswer(answerFour);
                turnBoxNumberWhite(boxNumberFour);
                break;
        }
    })

    answerButtons.forEach(button => {
        const innerBoxNumber = button.querySelector(".box-number");

        button.addEventListener("click", () => {

            if (hasQuestionBeenAnswered === true) {
                return;
            }

            turnBoxNumberWhite(innerBoxNumber);
            selectAnswer(button);

        });
    })

</script>
</body>
</html>
