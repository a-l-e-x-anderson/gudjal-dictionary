<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="icon" type="image/png" href="/letter-b.png">
    <title>Birraya | Learn Gudjal</title>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,100..900;1,100..900&family=Cormorant+SC:wght@300;400;500;600;700&family=Coustard:wght@400;900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Patua+One&family=Raleway:ital,wght@0,100..900;1,100..900&family=Rock+Salt&display=swap');

        * {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans', sans-serif;
            box-sizing: border-box;
        }

        html, body {
            background: #fff7e0;
            height: 100%;
        }

        body {
            padding-left: 280px;
            padding-right: 280px;
        }

        #currently-selected-nav-item {
            border: 2px solid #282828;
            background: #e3e3e3;
        }

        nav {
            width: 280px;
            height: 100%;
            left: 0;
            background: white;
            border-right: 3px solid #282828;
            padding: 16px;

            display: flex;
            flex-flow: column;
            align-items: center;
            position: fixed;
        }

        nav ul {
            margin-top: 20px;
        }

        nav ul,
        nav ul li,
        nav ul li a {
            width: 100%;
            color: #282828;
        }

        nav ul li,
        nav ul li a {
            text-decoration: none;
            list-style-type: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        nav ul li a {
            height: 60px;
            margin: 4px;
            border-radius: 40px;
            border: 2px solid transparent;

            font-size: 22px;

            font-family: 'Patua One', serif;
            justify-content: flex-start;
            padding: 4px;
            padding-left: 16px;
        }

        nav ul li a:hover {
            border: 2px solid #282828;
            background: #e3e3e3;
        }

        #logo {
            width: 70%;
            height: 50px;

            display: flex;
            justify-content: flex-start;
            align-items: center;

            font-family: 'Patua One', serif;
            color: #282828;
            font-size: 36px;
            text-decoration: none;
        }

        #logo:hover {
            cursor: pointer;
        }

        .svg-icons {
            margin: 8px;
        }














        #right-bar {
            width: 280px;
            height: 100vh;      
            background: #fff7e0;   
            right: 0;
            top: 0;
            position: fixed;
            display: flex;
            flex-flow: column;
            align-items: center;
            border-left: 2px solid #282828;
            overflow: scroll;
        }

















        #search-area {
            width: 100%;
            padding: 16px;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-flow: column;
            gap: 16px;
        }

        #lesson-search {
            height: 50px;
            width: 80%;
            border-radius: 50px;
            border: none;
            border: 2px solid #282828;
            padding: 16px;
            font-size: 18px;
            box-shadow: 3px 3px 0px #000; 
            padding-left: 24px;
            padding-right: 24px;
        }

        #lesson-search:focus {
            outline: none;
        }



















        #refresh-button {
            width: 44px;
            height: 44px;
            background: #e3e3e3;
        }


        .raiserupper {
            transition: 0.4s ease;
        }

        .raiserupper:hover {
            cursor: pointer;
            transform: translateY(-8px);
        }

        .raiserupperabit {
            transition: 0.4s ease;
        }

        .raiserupperabit:hover {
            transform: translateY(-4px);
        }























        #dictionary-container {
            display: flex;
            flex-flow: column;
            align-items: center;
        }

        #dictionary-instructions {
            font-family: 'Patua One', serif;
            font-size: 28px;
            margin-top: 24px;
        }














        .ochre {
            background: #B77466;
        }

        .yellow {
            background: #FFE1AF;
        }

        .tan {
            background: #E2B59A;
        }

        .brown {
            background: #957C62;
        }



















        #search-results-area {
            width: 80%;
            padding-bottom: 40px;
        }

        table {
            width: 100%;
            background: white;
            margin-top: 20px;
            border: 2px solid black;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 3px 3px 0px #000;
        }

        table tr td {
            width: 50%;
        }

        .gudjal-column {
            font-size: 24px;
            font-weight: 500;
        }

        .english-column {
            font-weight: 300;
        }

        .speaker-column {
            font-weight: 200;
        }











        
        


        #speaker-button-container {
            width: 80%;
            display: flex;
            flex-flow: wrap;
            gap: 16px;
            justify-content: center;
        }

        #speaker-button-container > * {
            height: 44px;
            border-radius: 52px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #282828;
            padding: 16px;
            box-shadow: 3px 3px 0px #000;
        }

        .speaker-button:hover,
        #refresh-button:hover {
            cursor: pointer;
        }

        .speaker-initials {
            display: none;
        }







        h3 {
            font-size: 24px;
            font-family: 'Patua One', serif;
            font-weight: 100;
            margin-top: 8px;
            width: 80%;
            text-align: center;
        }














        @media (max-width: 800px) {

            #dictionary-instructions {
                font-size: 24px;
                text-align: center;
            }

            .english-column,
            .speaker-column {
                font-size: 16px;
            }

            .gudjal-column {
                font-size: 20px;
            }
        }

        @media (max-width: 900px) {

            .speaker-name {
                display: none;
            }
            
            .speaker-button > .speaker-initials {
                display: flex;
            }

            #speaker-button-container > .speaker-button,
            #refresh-button {
                height: 52px;
                width: 52px;
                border-radius: 52px;
            }

            #speaker-button-container {
                gap: 12px;
            }
        }

        @media (max-width: 550px) {

            #dictionary-results-table tbody tr td,
            #dictionary-results-table thead tr td {
                font-size: 12px;
                padding: 0;
                padding-bottom: 8px;
            }

            #speaker-button-container {
                gap: 6px;
            }


            #speaker-button-container > .speaker-button,
            #refresh-button {
                height: 32px;
                width: 32px;
                border-radius: 32px;
                font-size: 12px;
            }


        }


        @media (max-width: 1200px) {

            nav {
                width: 80px;
            }

            nav, 
            nav ul,
            nav ul li,
            nav ul li a {
                padding: 0;
            }

            #logo {
                font-size: 16px;
            }

            nav ul li a {
                font-size: 10px;
                width: 60px;
                height: 60px;
                border-radius: 8px;
                display: flex;
                justify-content: center;
                align-items: center;
                flex-flow: column;
            }

            #right-bar {
                background: white;
                display: none;
                position: fixed;
                width: 100%;
                height: 100%;
                border-left: none;
            }

            body {
                padding: 0px;
                padding-left: 80px;
            }
        }

    </style>
</head>
<body>

    <nav>
        <a href="/" id="logo">Birraya.</a>
        <ul>
            <li><a href="/"><img src="/icons/lessons.svg" alt="Lessons icon" width="24" height="24" class="svg-icons">Lessons</a></li>
            <li><a href="/dictionary/" id="currently-selected-nav-item"><img src="/icons/dictionary.svg" alt="Lessons icon" width="24" height="24" class="svg-icons">Dictionary</a></li>
            <li><a href="/grammar/"><img src="/icons/grammar.svg" alt="Lessons icon" width="24" height="24" class="svg-icons">Grammar</a></li>
            <li><a href="#"><img src="/icons/phrases.svg" alt="Lessons icon" width="24" height="24" class="svg-icons">Phrase Bank</a></li>
        </ul>
    </nav>

    <div id="dictionary-container">

            
        
            <div id="search-area">
                
                    <label id="dictionary-instructions" for="lesson-search">Look up a word in Gudjal or English:</label>
                    <input id="lesson-search" type="text">

                    <h3>Filter results by source:</h3>

                    <div id="speaker-button-container">
                        
                        <div class="speaker-button raiserupperabit ochre"><span class="speaker-name">Freddie Toomba</span><span class="speaker-initials">FT</span></div>
                        <div class="speaker-button raiserupperabit yellow"><span class="speaker-name">Harry Bunn</span><span class="speaker-initials">HB</span></div>
                        <div class="speaker-button raiserupperabit tan"><span class="speaker-name">George Reid</span><span class="speaker-initials">GR</span></div>
                        <div class="speaker-button raiserupperabit brown"><span class="speaker-name">Ranji Pope</span><span class="speaker-initials">RP</span></div>
                        <div class="speaker-button raiserupperabit tan"><span class="speaker-name">William Santo</span><span class="speaker-initials">WS</span></div>
                        <div class="speaker-button raiserupperabit brown"><span class="speaker-name">Bluff Downs</span><span class="speaker-initials">BD</span></div>
                        <div class="speaker-button raiserupperabit ochre"><span class="speaker-name">Homestead</span><span class="speaker-initials">HS</span></div>
                        <div class="speaker-button raiserupperabit yellow"><span class="speaker-name">Clarke River</span><span class="speaker-initials">CR</span></div>
                        
                        <div class="raiserupperabit" id="refresh-button">⨉</div>
                    </div>

                
            </div>

            <div id="search-results-area">

                <table id="dictionary-results-table">
                </table>

            </div>
        
    </div>

    <div id="right-bar">
        
    </div>


<script>

    let gudjalDictionary;

    Papa.parse("dictionary-copy.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: results => {
                console.log(results.data);
                displayResults(results.data);
                gudjalDictionary = results.data;
            }
    })


    const searchbar = document.querySelector("#lesson-search");
    const dictionaryResultsArea = document.querySelector("#search-results-area");

    const listOfSpeakerButtons = document.querySelectorAll(".speaker-button");
    const refreshButton = document.querySelector("#refresh-button");

    let selectedSpeaker = "";

    function displayResults (matchingEntries) {

        dictionaryResultsArea.innerHTML = matchingEntries
            .map(entry => `
                <table class="raiserupper">
                    <tbody>
                        <tr><td class="gudjal-column">${entry.gudjalEntry}</td><td class="speaker-column">${entry.speaker}</td></tr>
                        <tr><td class="english-column" colspan=2><i>${entry.englishTranslation}</i></td></tr>
                    </tbody>
                </table>
                `)
            .join("");

    }

    function disappearSpeakerButtons () {
        listOfSpeakerButtons.forEach(button => {
            button.style.display = "none";
        })
    }

    function showThisSpeakerButton (button) {
        button.style.display = "flex";
    }

    function filterDictionary () {

        const query = searchbar.value.toLowerCase();

        const matches = gudjalDictionary.filter(dictionaryEntry => {

            const matchesText = 
            dictionaryEntry.gudjalEntry.toLowerCase().includes(query) || 
            dictionaryEntry.englishTranslation.toLowerCase().includes(query)

            const matchesSpeaker = dictionaryEntry.speaker.includes(selectedSpeaker);

            return matchesText && matchesSpeaker;
        })

        displayResults(matches);
    }

    function changeSpeaker (thingThatWasJustClicked) {
        selectedSpeaker = thingThatWasJustClicked;
    }

    listOfSpeakerButtons.forEach(button => {
        button.addEventListener("click", () => {

            changeSpeaker(button.querySelector(".speaker-initials").innerText)
            filterDictionary();

            disappearSpeakerButtons();
            showThisSpeakerButton(button);

        })
    })

    searchbar.addEventListener("keyup", filterDictionary);

    refreshButton.addEventListener("click", () => {
        selectedSpeaker = "";
        searchbar.value = "";
        filterDictionary();
        listOfSpeakerButtons.forEach(button => {
            showThisSpeakerButton(button);
        })
    })

</script>
</body>
</html>
