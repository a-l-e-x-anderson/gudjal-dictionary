<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birraya</title>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,100..900;1,100..900&family=Cormorant+SC:wght@300;400;500;600;700&family=Coustard:wght@400;900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Patua+One&family=Raleway:ital,wght@0,100..900;1,100..900&family=Rock+Salt&display=swap');

        * {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans', sans-serif;
            box-sizing: border-box;
        }

        html, body {
            background: #fff7e0;
            height: 100%;
        }

        body {
            padding-left: 280px;
        }

        #currently-selected-nav-item {
            border: 2px solid #282828;
            background: #e3e3e3;
        }

        nav {
            width: 280px;
            height: 100%;
            left: 0;
            background: white;
            border-right: 3px solid #282828;
            padding: 16px;

            display: flex;
            flex-flow: column;
            align-items: center;
            position: fixed;
        }

        nav ul {
            margin-top: 20px;
        }

        nav ul,
        nav ul li,
        nav ul li a {
            width: 100%;
            color: #282828;
        }

        nav ul li,
        nav ul li a {
            text-decoration: none;
            list-style-type: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        nav ul li a {
            height: 60px;
            margin: 4px;
            border-radius: 40px;
            border: 2px solid transparent;

            font-size: 22px;

            font-family: 'Patua One', serif;
            justify-content: flex-start;
            padding: 4px;
            padding-left: 16px;
        }

        nav ul li a:hover {
            border: 2px solid #282828;
            background: #e3e3e3;
        }

        #logo {
            width: 80%;
            height: 50px;

            display: flex;
            justify-content: flex-start;
            align-items: center;

            font-family: 'Patua One', serif;
            color: #282828;
            font-size: 36px;
        }

        #logo:hover {
            cursor: pointer;
        }

        .svg-icons {
            margin: 8px;
        }

        #lesson-container {
            margin-right: 280px;
            min-height: 100vh;
        }

        #right-bar {
            width: 280px;
            height: 100vh;      
            background: #fff7e0;   
            right: 0;
            top: 0;
            display: flex;
            position: fixed;
            border-left: 2px solid #282828;
            flex-flow: column;
        }

        #search-area {
            width: 100%;
            padding: 16px;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-flow: column;
            gap: 16px;
        }

        #lesson-search {
            height: 50px;
            width: 80%;
            border-radius: 50px;
            border: none;
            border: 2px solid #282828;
            padding: 16px;
            font-size: 18px;
            box-shadow: 3px 3px 0px #000; 
            padding-left: 24px;
            padding-right: 24px;
        }

        #lesson-search:focus {
            outline: none;
        }

        #lesson-search-button-container {
            width: 80%;
            height: 50px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }

        .search-button {
            height: 100%;
            width: 20%;
            border-radius: 50px;
            background: white;
            border: 2px solid #282828;
            font-size: 18px;

            box-shadow: 3px 3px 0px #000; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .search-button:hover {
            cursor: pointer;
        }

        #dialogue-button {
            background: #B77466;
        }

        #music-button {
            background: #FFE1AF;
        }

        #story-button {
            background: #E2B59A;
        }

        #video-button {
            background: #957C62;
        }

        #lesson-selection-grid {
            width: 100%;

            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            padding: 16px;
        }

        .lesson {
            height: 200px;
            background: white;
            border: 2px solid #282828;
            border-radius: 16px;
            display: flex;
            align-items: flex-end;
            background: lightblue;

            box-shadow: 3px 3px 0px #000;
        }

        .lesson-summary {
            border-top: 2px solid #282828;
            height: 60px;
            width: 100%;
            background: white;
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;

            padding: 8px;
            font-size: 12px;
        }

    </style>
</head>
<body>

    <nav>
        <div id="logo">Birraya.</div>
        <ul>
            <li><a href="/"><img src="/icons/lessons.svg" alt="Lessons icon" width="24" height="24" class="svg-icons">Lessons</a></li>
            <li><a href="/dictionary/" id="currently-selected-nav-item"><img src="/icons/dictionary.svg" alt="Lessons icon" width="24" height="24" class="svg-icons">Dictionary</a></li>
            <li><a href="#"><img src="/icons/grammar.svg" alt="Lessons icon" width="24" height="24" class="svg-icons">Grammar</a></li>
            <li><a href="#"><img src="/icons/phrases.svg" alt="Lessons icon" width="24" height="24" class="svg-icons">Phrase Bank</a></li>
        </ul>
    </nav>

    <div id="lesson-container">
        <div id="search-area">
            <h2>Search for a word in Gudjal or English:</h2>
            <input id="lesson-search" type="text">
        </div>

        
    </div>

    <div id="right-bar">
        
    </div>
    
</body>
</html>
